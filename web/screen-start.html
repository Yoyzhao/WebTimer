<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比赛开始</title>
    <link rel="stylesheet" href="lib/fonts.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            background: #0f0f23;
        }

        .screen-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        .screen-content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
        }

        .screen-title {
            font-size: 4rem;
            font-weight: 800;
            color: white;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
        }

        .screen-title:empty,
        .screen-title[data-empty="true"] {
            display: none;
            margin-bottom: 0;
        }

        .screen-subtitle {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .screen-subtitle:empty,
        .screen-subtitle[data-empty="true"] {
            display: none;
        }

        .settings-btn {
            position: absolute;
            bottom: 1.5rem;
            right: 1.5rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 20;
        }

        .settings-btn:hover {
            opacity: 1;
        }

        #musicBtn {
            opacity: 0;
            transition: opacity 0.3s;
        }

        #musicBtn:hover {
            opacity: 1;
        }

        .settings-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            padding: 1rem;
        }

        .settings-panel.active {
            opacity: 1;
            visibility: visible;
        }

        .settings-content {
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            background: rgba(20, 20, 40, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 1.5rem;
            transform: scale(0.95) translateY(20px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .settings-panel.active .settings-content {
            transform: scale(1) translateY(0);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1.25rem;
            margin-bottom: 1.25rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: white;
        }

        .panel-close {
            width: 2rem;
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.5rem;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.2s;
            background: none;
            border: none;
        }

        .panel-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .file-upload {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.2);
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            overflow: hidden;
        }

        .file-upload:hover {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.1);
        }

        .file-upload input {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            opacity: 0 !important;
            cursor: pointer !important;
            z-index: 1 !important;
        }

        .file-upload-icon {
            width: 3rem;
            height: 3rem;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 0.5rem;
        }

        .file-upload-text {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .file-preview {
            position: relative;
            margin-top: 1rem;
            border-radius: 0.75rem;
            overflow: hidden;
        }

        .file-preview img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }

        .file-preview-audio {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 0.75rem;
        }

        .file-preview-remove {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            width: 1.5rem;
            height: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(239, 68, 68, 0.9);
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 0.75rem;
            border: none;
        }

        .toggle-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .toggle {
            position: relative;
            width: 3rem;
            height: 1.75rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .toggle.active {
            background: #6366f1;
        }

        .toggle::after {
            content: '';
            position: absolute;
            top: 0.25rem;
            left: 0.25rem;
            width: 1.25rem;
            height: 1.25rem;
            background: white;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .toggle.active::after {
            left: 1.5rem;
        }

        .btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            overflow: hidden;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            box-shadow: 0 15px 50px rgba(99, 102, 241, 0.5);
            transform: translateY(-2px);
        }

        @media (max-width: 640px) {
            .screen-title {
                font-size: 2.5rem;
            }
            .screen-subtitle {
                font-size: 1.125rem;
            }
        }
    </style>
</head>
<body>
    <div class="screen-bg" id="bg"></div>
    <div class="screen-content">
        <h1 class="screen-title" id="title">比赛即将开始</h1>
        <p class="screen-subtitle" id="subtitle">请做好准备</p>
    </div>

    <button class="settings-btn" onclick="toggleSettings()" title="设置">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
    </button>

    <button id="musicBtn" onclick="togglePageMusic()" style="position: absolute; bottom: 1.5rem; right: 5rem; width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 20;">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20" id="pagePlayIcon">
            <path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/>
        </svg>
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20" id="pagePauseIcon" style="display: none;">
            <path d="M5.75 3a.75.75 0 00-.75.75v12.5c0 .414.336.75.75.75h1.5a.75.75 0 00.75-.75V3.75A.75.75 0 007.5 3h-1.5zM12.75 3a.75.75 0 00-.75.75v12.5c0 .414.336.75.75.75h1.5a.75.75 0 00.75-.75V3.75a.75.75 0 00-.75-.75h-1.5z"/>
        </svg>
    </button>

    <div class="settings-panel" id="settingsPanel">
        <div class="settings-content">
            <div class="panel-header">
                <h2 class="panel-title">开始屏设置</h2>
                <button class="panel-close" onclick="toggleSettings()">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <div class="form-group">
                <label class="form-label">标题</label>
                <input type="text" class="form-input" id="titleInput" placeholder="输入标题" onchange="updateConfig()">
            </div>

            <div class="form-group">
                <label class="form-label">副标题</label>
                <input type="text" class="form-input" id="subtitleInput" placeholder="输入副标题" onchange="updateConfig()">
            </div>

            <div class="form-group">
                <label class="form-label">背景图片</label>
                <div class="file-upload" id="bgUpload">
                    <input type="file" id="bgImageInput" accept="image/*" onchange="handleBgImageUpload(event)">
                    <svg class="file-upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                    <span class="file-upload-text">点击或拖拽上传图片</span>
                </div>
                <div class="file-preview" id="bgImagePreview" style="display: none;">
                    <img id="bgPreviewImg" src="" alt="背景预览">
                    <button class="file-preview-remove" onclick="removeBgImage()">×</button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">背景音乐</label>
                <div class="file-upload" id="musicUpload">
                    <input type="file" id="musicInput" accept="audio/*" onchange="handleMusicUpload(event)">
                    <svg class="file-upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/>
                    </svg>
                    <span class="file-upload-text">点击或拖拽上传音频</span>
                </div>
                <div class="file-preview-audio" id="musicPreview" style="display: none;">
                    <button class="panel-close" id="musicPlayBtn" onclick="togglePreviewMusic()" style="width: 2rem; height: 2rem; position: static;">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20" id="playIcon">
                            <path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/>
                        </svg>
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20" id="pauseIcon" style="display: none;">
                            <path d="M5.75 3a.75.75 0 00-.75.75v12.5c0 .414.336.75.75.75h1.5a.75.75 0 00.75-.75V3.75A.75.75 0 007.5 3h-1.5zM12.75 3a.75.75 0 00-.75.75v12.5c0 .414.336.75.75.75h1.5a.75.75 0 00.75-.75V3.75a.75.75 0 00-.75-.75h-1.5z"/>
                        </svg>
                    </button>
                    <span style="flex: 1; color: rgba(255,255,255,0.7);" id="musicName">背景音乐</span>
                    <button class="panel-close" onclick="removeMusic()">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div class="toggle-group" style="margin-top: 0.5rem;">
                    <div class="toggle active" id="musicLoopToggle" onclick="toggleMusicLoop()"></div>
                    <label class="form-label" style="margin-bottom: 0;">循环播放</label>
                </div>
            </div>

            <button class="btn btn-primary" onclick="toggleSettings()">保存设置</button>
        </div>
    </div>

    <audio id="bgMusic" preload="auto" loop></audio>

    <script>
        const CONFIG_KEY = 'webtimer_screen_start';
        const MEDIA_KEY = 'webtimer_screen_start_media';

        let config = {
            title: '比赛即将开始',
            subtitle: '请做好准备',
            musicLoop: true
        };

        let media = {
            backgroundImage: '',
            backgroundMusic: ''
        };

        let db = null;
        const DB_NAME = 'WebTimerDB';
        const DB_VERSION = 1;
        const MEDIA_STORE = 'mediaFiles';

        async function initIndexedDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    if (!database.objectStoreNames.contains(MEDIA_STORE)) {
                        database.createObjectStore(MEDIA_STORE, { keyPath: 'id' });
                    }
                };
            });
        }

        async function saveMediaToIDB(id, data) {
            if (!db) await initIndexedDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(MEDIA_STORE, 'readwrite');
                const store = tx.objectStore(MEDIA_STORE);
                const request = store.put({ id, data });
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        async function loadMediaFromIDB(id) {
            if (!db) await initIndexedDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(MEDIA_STORE, 'readonly');
                const store = tx.objectStore(MEDIA_STORE);
                const request = store.get(id);
                request.onsuccess = () => resolve(request.result?.data || null);
                request.onerror = () => reject(request.error);
            });
        }

        async function deleteMediaFromIDB(id) {
            if (!db) await initIndexedDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(MEDIA_STORE, 'readwrite');
                const store = tx.objectStore(MEDIA_STORE);
                const request = store.delete(id);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        async function loadMedia() {
            await initIndexedDB();
            const saved = localStorage.getItem(MEDIA_KEY);
            if (saved) {
                try {
                    media = JSON.parse(saved);
                } catch (e) {}
            }
            try {
                const bgImage = await loadMediaFromIDB('startScreenBackgroundImage');
                if (bgImage) media.backgroundImage = bgImage;
                const bgMusic = await loadMediaFromIDB('startScreenBackgroundMusic');
                if (bgMusic) media.backgroundMusic = bgMusic;
            } catch (e) {}
        }

        async function saveMedia() {
            localStorage.setItem(MEDIA_KEY, JSON.stringify({
                backgroundImage: '',
                backgroundMusic: ''
            }));
            if (media.backgroundImage) {
                await saveMediaToIDB('startScreenBackgroundImage', media.backgroundImage);
            }
            if (media.backgroundMusic) {
                await saveMediaToIDB('startScreenBackgroundMusic', media.backgroundMusic);
            }
        }

        function loadConfig() {
            const saved = localStorage.getItem(CONFIG_KEY);
            if (saved) {
                try {
                    config = { ...config, ...JSON.parse(saved) };
                } catch (e) {}
            }
            applyConfig();
        }

        function saveConfig() {
            localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
        }

        function applyConfig() {
            const titleValue = config.title !== undefined ? config.title : '比赛即将开始';
            const subtitleValue = config.subtitle !== undefined ? config.subtitle : '请做好准备';
            document.getElementById('title').textContent = titleValue;
            document.getElementById('title').setAttribute('data-empty', titleValue === '' ? 'true' : 'false');
            document.getElementById('subtitle').textContent = subtitleValue;
            document.getElementById('subtitle').setAttribute('data-empty', subtitleValue === '' ? 'true' : 'false');
            document.getElementById('titleInput').value = config.title !== undefined ? config.title : '';
            document.getElementById('subtitleInput').value = config.subtitle !== undefined ? config.subtitle : '';

            if (media.backgroundImage) {
                document.getElementById('bg').style.backgroundImage = `url(${media.backgroundImage})`;
                document.getElementById('bgPreviewImg').src = media.backgroundImage;
                document.getElementById('bgImagePreview').style.display = 'block';
                document.getElementById('bgUpload').style.display = 'none';
            } else {
                document.getElementById('bg').style.backgroundImage = '';
                document.getElementById('bgImagePreview').style.display = 'none';
                document.getElementById('bgUpload').style.display = 'flex';
            }

            if (media.backgroundMusic) {
                document.getElementById('musicPreview').style.display = 'flex';
                document.getElementById('musicUpload').style.display = 'none';
                document.getElementById('musicBtn').style.display = 'flex';
            } else {
                document.getElementById('musicPreview').style.display = 'none';
                document.getElementById('musicUpload').style.display = 'flex';
                document.getElementById('musicBtn').style.display = 'none';
            }

            document.getElementById('musicLoopToggle').classList.toggle('active', config.musicLoop);
        }

        function updateConfig() {
            config.title = document.getElementById('titleInput').value;
            config.subtitle = document.getElementById('subtitleInput').value;
            saveConfig();
            applyConfig();
        }

        function handleBgImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                media.backgroundImage = e.target.result;
                await saveMedia();
                applyConfig();
            };
            reader.readAsDataURL(file);
        }

        async function removeBgImage() {
            media.backgroundImage = '';
            await saveMedia();
            await deleteMediaFromIDB('startScreenBackgroundImage');
            document.getElementById('bgImageInput').value = '';
            applyConfig();
        }

        function handleMusicUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                media.backgroundMusic = e.target.result;
                document.getElementById('musicName').textContent = file.name;
                await saveMedia();
                applyConfig();
                const audio = document.getElementById('bgMusic');
                audio.src = media.backgroundMusic;
            };
            reader.readAsDataURL(file);
        }

        async function removeMusic() {
            media.backgroundMusic = '';
            await saveMedia();
            await deleteMediaFromIDB('startScreenBackgroundMusic');
            document.getElementById('musicInput').value = '';
            const audio = document.getElementById('bgMusic');
            audio.pause();
            audio.src = '';
            applyConfig();
        }

        function toggleMusicLoop() {
            const toggle = document.getElementById('musicLoopToggle');
            toggle.classList.toggle('active');
            config.musicLoop = toggle.classList.contains('active');
            document.getElementById('bgMusic').loop = config.musicLoop;
            saveConfig();
        }

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.classList.toggle('active');
        }

        function playMusic() {
            if (media.backgroundMusic) {
                const audio = document.getElementById('bgMusic');
                if (!audio.src || audio.src === window.location.href) {
                    audio.src = media.backgroundMusic;
                }
                audio.loop = config.musicLoop;
                audio.play().catch(() => {});
                document.getElementById('playIcon').style.display = 'none';
                document.getElementById('pauseIcon').style.display = 'block';
                document.getElementById('pagePlayIcon').style.display = 'none';
                document.getElementById('pagePauseIcon').style.display = 'block';
            }
        }

        function pauseMusic() {
            const audio = document.getElementById('bgMusic');
            audio.pause();
            document.getElementById('playIcon').style.display = 'block';
            document.getElementById('pauseIcon').style.display = 'none';
            document.getElementById('pagePlayIcon').style.display = 'block';
            document.getElementById('pagePauseIcon').style.display = 'none';
        }

        function togglePreviewMusic() {
            const audio = document.getElementById('bgMusic');
            if (audio.paused) {
                playMusic();
                document.getElementById('playIcon').style.display = 'none';
                document.getElementById('pauseIcon').style.display = 'block';
            } else {
                pauseMusic();
            }
        }

        function togglePageMusic() {
            if (!media.backgroundMusic) return;
            const audio = document.getElementById('bgMusic');
            if (audio.paused || audio.currentTime === 0) {
                playMusic();
            } else {
                pauseMusic();
            }
        }

        window.addEventListener('message', (e) => {
            if (e.data.action === 'playMusic') playMusic();
            else if (e.data.action === 'pauseMusic') pauseMusic();
            else if (e.data.action === 'toggleMusic') togglePageMusic();
        });

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
                window.parent.postMessage({
                    type: 'screenNavigation',
                    code: e.code,
                    screen: 1
                }, '*');
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            await loadMedia();
            loadConfig();
        });
    </script>
</body>
</html>
